<!DOCTYPE html>
<meta charset="utf-8">
<head>
  <title>主页 - 朋友的小店</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <style>
		body {
			margin: 0;
			padding: 0;
			background-color: #f1f1f1;
			color: #000000;
			font-family: Arial, sans-serif;
		}

		/* 顶部导航栏 */
		.topnav {
			background-color: #ffffff;
			overflow: hidden;
			padding: 20px;
			text-align: center;
		}
		
		/* 导航栏链接样式 */
		.topnav a {
			color: #000000;
			padding: 14px 16px;
			text-decoration: none;
			font-size: 20px;
			font-weight: bold;
			display: inline-block;
			margin-right: 10px;
			border-radius: 5px;
			transition: all 0.3s ease;
		}

		/* 鼠标悬停效果 */
		.topnav a:hover {
			background-color: #e0e0e0;
			box-shadow: 0px 0px 5px #000000;
			color: #000000;
		}

		/* 侧边栏 */
		.sidenav {
			height: 100%;
			width: 250px;
			position: fixed;
			z-index: 1;
			top: 0;
			left: -250px;
			background-color: #ffffff;
			overflow-x: hidden;
			padding-top: 20px;
			transition: all 0.3s ease;
		}

		/* 打开侧边栏的按钮 */
		.openbtn {
			font-size: 20px;
			cursor: pointer;
			background-color: #ffffff;
			color: #000000;
			padding: 10px 15px;
			border: none;
			border-radius: 5px 0px 0px 5px;
			margin-right: 10px;
			transition: all 0.3s ease;
		}
		
		/* 点击打开按钮后的样式 */
		.openbtn:hover {
			background-color: #e0e0e0;
			box-shadow: 0px 0px 5px #000000;
			color: #000000;
		}
		
		/* 关闭侧边栏的按钮 */
		.closebtn {
			font-size: 20px;
			cursor: pointer;
			background-color: #ffffff;
			color: #000000;
			padding: 10px 15px;
			border: none;
			border-radius: 0px 5px 5px 0px;
			margin-right: 10px;
			transition: all 0.3s ease;
		}

		/* 鼠标悬停效果 */
		.closebtn:hover {
			background-color: #e0e0e0;
			box-shadow: 0px 0px 5px #000000;
			color: #000000;
		}

		/* 关闭侧边栏按钮所在的容器 */
		.closebtn-container {
			text-align: right;
			margin-bottom: 20px;
		}

		/* 侧边栏链接样式 */
		.sidenav a {
			padding: 10px 8px 10px 32px;
			text-decoration: none;
			font-size: 20px;
			color: #000000;
			display: block;
			transition: all 0.3s ease;
		}

		/* 鼠标悬停效果 */
		.sidenav a:hover {
			background-color: #e0e0e0;
			box-shadow: 0px 0px 5px #000000;
			color: #000000;
			padding-left: 48px;
		}

		/* 当前页面的链接 */
		.active {
			background-color: #e0e0e0;
			box-shadow: 0px 0px 5px #000000;
			color: #000000;
			padding-left: 48px;
		}
	  /* 浮动卡片容器 */
		.card-container {
			width: 100%;
			overflow: hidden;
		}

		/* 左侧浮动卡片 */
		.left-card {
			width: 45%;
			margin: 10px;
			padding: 20px;
			background-color: #ffffff;
			color: #000000;
			border-radius: 5px;
			box-sizing: border-box;
			float: left;
		}

		/* 右侧浮动卡片 */
		.right-card {
			width: 45%;
			margin: 10px;
			padding: 20px;
			background-color: #ffffff;
			color: #000000;
			border-radius: 5px;
			box-sizing: border-box;
			float: right;
		}
	</style>
</head>
<body>
<body>
	<!-- 侧边栏 -->
	<div class="sidenav" id="mySidenav">
		<div class="closebtn-container">
			<button class="closebtn" onclick="closeNav()">×</button>
		</div>
		<a href="#" class="active">主页</a>
		<a href="#">推荐</a>
		<a href="#">热门</a>
		<p style="font-size: 20%"> 本站不遵循GNU协议，不允许传播，且不允许二次更改。 </p>
	</div>
	
	<!-- 顶部导航栏 -->
	<div class="topnav">
		<button class="openbtn" onclick="openNav()">☰</button>
		<a href="#" class="active">主页</a>
		<a href="#">文具</a>
		<a href="#">其他</a>
	</div>

	<div class="card-container">
		<!-- 左侧浮动卡片 -->
		<div class="left-card">
			<h2>标题</h2>
			<p>这里可以写一些描述，但是我不写了（</p>
		</div>

		<!-- 右侧浮动卡片 -->
		<div class="right-card">
			<h2>标题</h2>
			<p>当然这也是的，但是我不想说。</p>
		</div>
	</div>


	<!-- 打开侧边栏的 JavaScript 代码 -->
	<script>
		function openNav() {
			document.getElementById("mySidenav").style.left = "0";
		}

		function closeNav() {
			document.getElementById("mySidenav").style.left = "-250px";
		}
	</script>
</body>
