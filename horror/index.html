<!DOCTYPE html>  
<html>  
<head>  
  <title>模拟模拟信号效果</title>  
  <style>  
    body {  
      background-color: black;  
    }  
      
    .simulation {  
      width: 400px;  
      height: 300px;  
      position: relative;  
      margin: 0 auto;  
    }  
      
    .signal {  
      position: absolute;  
      top: 50%;  
      left: 50%;  
      transform: translate(-50%, -50%);  
      font-size: 24px;  
      color: white;  
      font-family: monospace;  
    }  
      
    .signal::before {  
      content: "⏪";  
    }  
      
    .signal::after {  
      content: "⏩";  
    }  
      
    .container {  
      width: 320px;  
      height: 240px;  
      position: relative;  
      margin: 0 auto;  
      background-color: purple;  
    }  
  </style>  
</head>  
<body>  
  <div class="simulation">  
    <div class="signal"></div>  
  </div>  
  <div class="container"></div>  
</body>  
</html>
